name: 'agentic_churn'
version: '1.0.0'
config-version: 2

profile: 'agentic_churn'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  agentic_churn:
    staging:
      +materialized: view
      +schema: stg
    core:
      +materialized: table
      +schema: core
    marts:
      +materialized: table
      +schema: marts